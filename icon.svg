<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="420" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <!-- Femur bone -->
  <line x1="256" y1="80" x2="256" y2="240" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Knee joint -->
  <circle cx="256" cy="256" r="28" fill="none" stroke="white" stroke-width="6" opacity="0.5"/>
  <!-- Tibia bone -->
  <line x1="256" y1="272" x2="256" y2="432" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Angle arc (LDFA) -->
  <path d="M 200 200 A 70 70 0 0 1 256 180" fill="none" stroke="#4caf7d" stroke-width="5" stroke-linecap="round"/>
  <!-- Angle arc (MPTA) -->
  <path d="M 256 332 A 70 70 0 0 1 312 312" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
  <!-- Angle indicator dots -->
  <circle cx="200" cy="200" r="6" fill="#4caf7d"/>
  <circle cx="312" cy="312" r="6" fill="#7c3aed"/>
  <!-- Grid lines (3x3 matrix hint) -->
  <rect x="340" y="120" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="360" y="120" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="380" y="120" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="340" y="140" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="360" y="140" width="8" height="8" rx="2" fill="#4caf7d" opacity="0.8"/>
  <rect x="380" y="140" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="340" y="160" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="360" y="160" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="380" y="160" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
</svg>
